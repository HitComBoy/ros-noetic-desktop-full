name: Download Offline Packages for Ubuntu 22.04
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Quick Download Debs
        run: |
          mkdir -p ./offline_packages
          sudo apt-get update
          
          # 定義包名列表
          PACKAGES="libgoogle-glog-dev zsh vim git tmux liblapack-dev libsuitesparse-dev libcxsparse4 libgflags-dev libgtest-dev"
          
          # 使用官方推薦的 --download-only 方式，自動解析依賴
          sudo apt-get install --reinstall --download-only -y $PACKAGES
          
          # 將緩存的 .deb 檔案移動到指定目錄
          find /var/cache/apt/archives/ -name "*.deb" -exec cp {} ./offline_packages/ \;
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-22.04-fast-bundle
          path: ./offline_packages/
