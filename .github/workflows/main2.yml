name: Download Offline Packages for Ubuntu 22.04
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Quick Download Debs
        run: |
          mkdir -p ./offline_packages && cd ./offline_packages
          sudo apt-get update
          
          # 定義主包列表
          PACKAGES="libgoogle-glog-dev zsh vim git tmux liblapack-dev libsuitesparse-dev libgflags-dev libgtest-dev"
          
          # 1. 獲取依賴名單（排除虛擬包，僅保留真實包名）
          DEPS=$(apt-cache depends --recurse --no-recommends --no-suggests $PACKAGES | grep "^\w" | sort -u)
          
          # 2. 執行下載（apt-get download 不會重複下載已存在的檔案）
          # 使用 || true 確保個別包找不到時不中斷流程
          sudo apt-get download $DEPS $PACKAGES || true
          
          # 3. 確保主包一定存在
          sudo apt-get download $PACKAGES || true
          
          # 檢查下載數量
          ls -lh | wc -l
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-22.04-fast-bundle
          path: ./offline_packages/
