name: Force Download JSK Focal Bundle
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Force Download Focal Debs
        run: |
          mkdir -p ./focal_bundle && cd ./focal_bundle
          # 1. 獲取 ROS 官方金鑰
          sudo apt-key adv --keyserver 'hkp://keyserver.ubuntu.com:80' --recv-key C1CF6E31E6BADE8868B172B4F42ED6FBAB17C654

          # 2. 強力清理並寫入正確的 Focal (20.04) 官方路徑
          sudo rm -f /etc/apt/sources.list.d/ros-latest.list
          sudo sh -c 'echo "deb http://packages.ros.org focal main" > /etc/apt/sources.list.d/ros-latest.list'
          
          # 3. 更新並下載
          sudo apt-get update
          PACKAGES="ros-noetic-jsk-rviz-plugins ros-noetic-jsk-recognition-msgs ros-noetic-jsk-topic-tools"
          
          # 4. 下載主包及所有依賴
          DEPS=$(apt-cache depends --recurse --no-recommends --no-suggests $PACKAGES | grep "^\w" | sort -u)
          sudo apt-get download $DEPS $PACKAGES || true
          
          # 5. 列出檔案
          ls -lh
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jsk-focal-bundle
          path: ./focal_bundle/
