name: Download JSK Focal Bundle
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-20.04  # 這是關鍵：強制匹配你的容器版本
    steps:
      - name: Download Debs
        run: |
          mkdir -p ./focal_debs && cd ./focal_debs
          # 添加 ROS 官方源
          sudo sh -c 'echo "deb http://packages.ros.org focal main" > /etc/apt/sources.list.d/ros-latest.list'
          curl -s https://raw.githubusercontent.com | sudo apt-key add -
          sudo apt-get update
          
          # 下載 JSK 插件及其所有 Focal 版本的依賴
          apt-get download $(apt-cache depends --recurse --no-recommends --no-suggests ros-noetic-jsk-rviz-plugins | grep "^\w" | sort -u)
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: jsk-focal-complete-bundle
          path: ./focal_debs/
